services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskmanager-net

  taskmanager:
    build: .
    container_name: taskmanager
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/
      DB_NAME: taskmanager
    depends_on:
      - mongodb
    networks:
      - taskmanager-net

volumes:
  mongodb_data:

networks:
  taskmanager-net:
    driver: bridge
