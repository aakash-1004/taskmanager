apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager
  namespace: taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager
  template:
    metadata:
      labels:
        app: taskmanager
    spec:
      containers:
      - name: taskmanager
        image: taskmanager:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://admin:password@mongodb:27017/"
        - name: DB_NAME
          value: "taskmanager"
---
apiVersion: v1
kind: Service
metadata:
  name: taskmanager
  namespace: taskmanager
spec:
  type: NodePort
  selector:
    app: taskmanager
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30000
